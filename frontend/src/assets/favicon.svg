<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" fill="black"/>
  <!-- Camera body -->
  <rect x="4" y="10" width="24" height="16" rx="0" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Lens circle -->
  <circle cx="16" cy="18" r="5" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Viewfinder bump -->
  <rect x="11" y="7" width="6" height="3" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Shutter dot -->
  <circle cx="16" cy="18" r="2" fill="white"/>
</svg>
